<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="theme-color-meta" content="#1a202c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <link rel="manifest" href="manifest.json">
    <title>Income & Budget Tracker</title>
    <style>
        :root {
            --bg:          #f0f4f8;
            --surface:     #ffffff;
            --text:        #1a202c;
            --text-muted:  #718096;
            --text-label:  #4a5568;
            --border:      #e2e8f0;
            --input-bg:    #f7fafc;
            --header-bg:   #1a202c;
            --nav-bg:      #2d3748;
            --nav-muted:   #a0aec0;
            --nav-active:  #ffffff;
            --tag-bg:      #edf2f7;
            --tag-text:    #4a5568;
            --bal-from:    #2d3748;
            --bal-to:      #1a202c;
            --bal-border:  rgba(255,255,255,0.1);
            --shadow:      0 1px 3px rgba(0,0,0,0.10);
            --shadow-sm:   0 1px 2px rgba(0,0,0,0.08);
        }

        body.dark {
            --bg:          #0f172a;
            --surface:     #1e293b;
            --text:        #f1f5f9;
            --text-muted:  #94a3b8;
            --text-label:  #cbd5e1;
            --border:      #334155;
            --input-bg:    #0f172a;
            --header-bg:   #020617;
            --nav-bg:      #0f172a;
            --nav-muted:   #64748b;
            --nav-active:  #f1f5f9;
            --tag-bg:      #334155;
            --tag-text:    #cbd5e1;
            --bal-from:    #1e3a5f;
            --bal-to:      #0f172a;
            --bal-border:  rgba(255,255,255,0.07);
            --shadow:      0 1px 3px rgba(0,0,0,0.40);
            --shadow-sm:   0 1px 2px rgba(0,0,0,0.30);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        /* ── Header ── */
        header {
            background: var(--header-bg);
            color: #fff;
            padding: 0.9rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }

        #mode-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.1rem;
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #mode-btn:hover { background: rgba(255,255,255,0.2); }

        /* ── Tabs ── */
        .tab-nav { display: flex; background: var(--nav-bg); transition: background 0.25s; }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: var(--nav-muted);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--nav-active);
            border-bottom-color: #f6e05e;
            background: rgba(255,255,255,0.05);
        }

        /* ── Layout ── */
        .tab-content { display: none; padding: 1.1rem; max-width: 680px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* ── Summary cards ── */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            margin: 1.1rem 0;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 0.9rem;
            box-shadow: var(--shadow);
            transition: background 0.25s, box-shadow 0.25s;
        }

        .card-label {
            font-size: 0.67rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .card-value { font-size: 1.15rem; font-weight: 700; }
        .green  { color: #38a169; }
        .blue   { color: #3182ce; }
        .orange { color: #dd6b20; }

        /* ── Form card ── */
        .form-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.1rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.1rem;
            transition: background 0.25s;
        }

        .form-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.65rem;
            margin-bottom: 0.65rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.28rem; }

        label { font-size: 0.76rem; font-weight: 600; color: var(--text-label); }

        input, select {
            padding: 0.58rem 0.7rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--text);
            background: var(--input-bg);
            outline: none;
            width: 100%;
            transition: border-color 0.2s, background 0.25s, color 0.25s;
        }

        input:focus, select:focus {
            border-color: #4299e1;
            background: var(--surface);
        }

        /* ── Type toggle ── */
        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.45rem;
            margin-bottom: 0.55rem;
        }

        .type-btn {
            padding: 0.55rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .type-btn.sel-green  { border-color: #38a169; background: rgba(56,161,105,0.12); color: #38a169; }
        .type-btn.sel-blue   { border-color: #3182ce; background: rgba(49,130,206,0.12); color: #3182ce; }
        .type-btn.sel-red    { border-color: #e53e3e; background: rgba(229,62,62,0.12);  color: #e53e3e; }
        .type-btn.sel-orange { border-color: #dd6b20; background: rgba(221,107,32,0.12); color: #dd6b20; }

        /* ── Submit button ── */
        .btn {
            width: 100%;
            padding: 0.72rem;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.2rem;
            transition: opacity 0.2s, filter 0.2s;
        }

        .btn:hover { filter: brightness(1.1); }
        .btn-dark  { background: #2d3748; color: #fff; }
        .btn-green { background: #38a169; color: #fff; }
        .btn-red   { background: #e53e3e; color: #fff; }

        /* ── Section title ── */
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.65rem;
        }

        /* ── Entry list ── */
        .entry-list { display: flex; flex-direction: column; gap: 0.45rem; }

        .entry-item {
            background: var(--surface);
            border-radius: 10px;
            padding: 0.8rem 0.9rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.25s;
        }

        .entry-meta { display: flex; flex-direction: column; gap: 0.12rem; }
        .entry-date { font-size: 0.72rem; color: var(--text-muted); }
        .entry-note { font-size: 0.82rem; color: var(--text); }

        .entry-right { display: flex; align-items: center; gap: 0.65rem; }
        .entry-amount { font-size: 0.97rem; font-weight: 700; white-space: nowrap; }

        .amt-taxi    { color: var(--text); }
        .amt-income  { color: #38a169; }
        .amt-saving  { color: #3182ce; }
        .amt-expense { color: #e53e3e; }

        .del-btn {
            background: none;
            border: none;
            color: var(--border);
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            padding: 0.15rem;
            transition: color 0.2s;
        }

        .del-btn:hover { color: #e53e3e; }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.87rem;
            background: var(--surface);
            border-radius: 12px;
            transition: background 0.25s;
        }

        /* ── Balance card ── */
        .balance-card {
            background: linear-gradient(135deg, var(--bal-from), var(--bal-to));
            color: white;
            border-radius: 16px;
            padding: 1.4rem;
            margin-top: 1.1rem;
            margin-bottom: 1rem;
            text-align: center;
            transition: background 0.25s;
        }

        .balance-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
        }

        .balance-value { font-size: 2.3rem; font-weight: 800; letter-spacing: -0.02em; }
        .bal-pos { color: #68d391; }
        .bal-neg { color: #fc8181; }

        .balance-row {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bal-border);
        }

        .bal-sub { text-align: center; }
        .bal-sub-label { font-size: 0.67rem; color: rgba(255,255,255,0.55); margin-bottom: 0.2rem; }
        .bal-sub-value { font-size: 0.92rem; font-weight: 700; }

        .tag {
            display: inline-block;
            font-size: 0.67rem;
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 4px;
            padding: 0.1rem 0.35rem;
            font-weight: 600;
            transition: background 0.25s, color 0.25s;
        }

        /* ── Install banner ── */
        #install-banner {
            display: none;
            background: #2d3748;
            color: white;
            padding: 0.7rem 1.1rem;
            font-size: 0.82rem;
            align-items: center;
            gap: 0.75rem;
        }

        #install-banner span { flex: 1; }

        #install-banner button {
            background: #f6e05e;
            color: #1a202c;
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        #install-dismiss {
            background: none !important;
            color: rgba(255,255,255,0.5) !important;
            font-size: 1rem !important;
            padding: 0 !important;
        }

        @media (max-width: 360px) {
            .card-value      { font-size: 0.97rem; }
            .balance-value   { font-size: 1.85rem; }
            .bal-sub-value   { font-size: 0.82rem; }
        }
    </style>
</head>
<body>

<!-- Install to home screen banner -->
<div id="install-banner">
    <span>📱 Add to your home screen for quick access</span>
    <button id="install-btn">Install</button>
    <button id="install-dismiss">✕</button>
</div>

<header>
    <span style="font-size:1.3rem">🚕</span>
    <h1>Income & Budget Tracker</h1>
    <button id="mode-btn" onclick="toggleMode()" title="Toggle dark/light mode">🌙</button>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('taxi')">🚖 Taxi Income</button>
    <button class="tab-btn"        onclick="switchTab('budget')">💰 Budget</button>
</div>

<!-- ════════════ TAXI TAB ════════════ -->
<div id="tab-taxi" class="tab-content active">

    <div class="summary-grid">
        <div class="card">
            <div class="card-label">Today</div>
            <div class="card-value green"  id="taxi-today">RF 0.00</div>
        </div>
        <div class="card">
            <div class="card-label">This Week</div>
            <div class="card-value blue"   id="taxi-week">RF 0.00</div>
        </div>
        <div class="card">
            <div class="card-label">This Month</div>
            <div class="card-value orange" id="taxi-month">RF 0.00</div>
        </div>
    </div>

    <div class="form-card">
        <div class="form-title">Add Earnings</div>
        <div class="form-row">
            <div class="form-group">
                <label for="taxi-date">Date</label>
                <input type="date" id="taxi-date">
            </div>
            <div class="form-group">
                <label for="taxi-amount">Amount (RF)</label>
                <input type="number" id="taxi-amount" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>
        <div class="form-group" style="margin-bottom:0.65rem">
            <label for="taxi-note">Note (optional)</label>
            <input type="text" id="taxi-note" placeholder="e.g. Morning shift, long trip…">
        </div>
        <button class="btn btn-dark" onclick="addTaxiEntry()">+ Add Earnings</button>
    </div>

    <div class="section-title">Earnings History</div>
    <div class="entry-list" id="taxi-list"></div>

    <div style="height:1.2rem"></div>

    <!-- Trip Log -->
    <div class="section-title">🚗 Trip Log</div>

    <div class="form-card">
        <div class="form-title">Log a Trip</div>
        <div class="form-row">
            <div class="form-group">
                <label for="trip-date">Date</label>
                <input type="date" id="trip-date">
            </div>
            <div class="form-group">
                <label for="trip-amount">Amount (RF)</label>
                <input type="number" id="trip-amount" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>
        <div class="form-group" style="margin-bottom:0.65rem">
            <label for="trip-note">Destination / Note (optional)</label>
            <input type="text" id="trip-note" placeholder="e.g. Airport, School run…">
        </div>
        <button class="btn btn-green" onclick="addTrip()">+ Log Trip</button>
    </div>

    <div class="entry-list" id="trip-list"></div>
</div>

<!-- ════════════ BUDGET TAB ════════════ -->
<div id="tab-budget" class="tab-content">

    <div class="balance-card">
        <div class="balance-label">Net Balance</div>
        <div class="balance-value bal-pos" id="budget-balance">RF 0.00</div>
        <div class="balance-row">
            <div class="bal-sub">
                <div class="bal-sub-label">Income</div>
                <div class="bal-sub-value" style="color:#68d391" id="b-income">RF 0.00</div>
            </div>
            <div class="bal-sub">
                <div class="bal-sub-label">Expenses</div>
                <div class="bal-sub-value" style="color:#fc8181" id="b-expenses">RF 0.00</div>
            </div>
            <div class="bal-sub">
                <div class="bal-sub-label">Savings</div>
                <div class="bal-sub-value" style="color:#63b3ed" id="b-savings">RF 0.00</div>
            </div>
        </div>
    </div>

    <div class="form-card">
        <div class="form-title">Add Entry</div>

        <div class="type-toggle">
            <button class="type-btn sel-green" id="btn-income"     onclick="setType('income')">+ Income</button>
            <button class="type-btn"           id="btn-savings"    onclick="setType('savings')">🏦 Save</button>
        </div>
        <div class="type-toggle">
            <button class="type-btn"           id="btn-expense"    onclick="setType('expense')">− Expense</button>
            <button class="type-btn"           id="btn-withdrawal" onclick="setType('withdrawal')">↩ Withdraw</button>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="budget-date">Date</label>
                <input type="date" id="budget-date">
            </div>
            <div class="form-group">
                <label for="budget-amount">Amount (RF)</label>
                <input type="number" id="budget-amount" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="budget-cat">Category</label>
                <select id="budget-cat">
                    <option>General</option>
                    <option>Food</option>
                    <option>Fuel</option>
                    <option>Rent</option>
                    <option>Utilities</option>
                    <option>Transport</option>
                    <option>Car Maintenance</option>
                    <option>Clothing</option>
                    <option>Health</option>
                    <option>Entertainment</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="budget-note">Note (optional)</label>
                <input type="text" id="budget-note" placeholder="Description">
            </div>
        </div>
        <button class="btn btn-green" id="budget-submit" onclick="addBudgetEntry()">+ Add Income</button>
    </div>

    <div class="section-title">Transactions</div>
    <div class="entry-list" id="budget-list"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let taxiEntries   = JSON.parse(localStorage.getItem('taxi_entries')   || '[]');
let taxiTrips     = JSON.parse(localStorage.getItem('taxi_trips')     || '[]');
let budgetEntries = JSON.parse(localStorage.getItem('budget_entries') || '[]');
let budgetType    = 'income';

// ── Boot ─────────────────────────────────────────────────────
document.getElementById('taxi-date').value   = todayStr();
document.getElementById('trip-date').value   = todayStr();
document.getElementById('budget-date').value = todayStr();

// Restore dark mode
if (localStorage.getItem('dark_mode') === '1') applyDark(true);

renderTaxi();
renderTrips();
renderBudget();

// Register service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Dark mode ────────────────────────────────────────────────
function applyDark(on) {
    document.body.classList.toggle('dark', on);
    document.getElementById('mode-btn').textContent = on ? '☀️' : '🌙';
    document.getElementById('theme-color-meta').content = on ? '#020617' : '#1a202c';
}

function toggleMode() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('dark_mode', isDark ? '1' : '0');
    document.getElementById('mode-btn').textContent = isDark ? '☀️' : '🌙';
    document.getElementById('theme-color-meta').content = isDark ? '#020617' : '#1a202c';
}

// ── PWA install prompt ────────────────────────────────────────
let deferredInstall = null;

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstall = e;
    const banner = document.getElementById('install-banner');
    banner.style.display = 'flex';
});

document.getElementById('install-btn').onclick = async () => {
    if (!deferredInstall) return;
    deferredInstall.prompt();
    const { outcome } = await deferredInstall.userChoice;
    if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
    deferredInstall = null;
};

document.getElementById('install-dismiss').onclick = () => {
    document.getElementById('install-banner').style.display = 'none';
};

// ── Helpers ──────────────────────────────────────────────────
function todayStr() {
    return new Date().toISOString().split('T')[0];
}

function fmt(n) {
    return 'RF ' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
}

function weekStart() {
    const d   = new Date();
    const dow = d.getDay();
    const diff = d.getDate() - dow + (dow === 0 ? -6 : 1);
    return new Date(d.getFullYear(), d.getMonth(), diff).toISOString().split('T')[0];
}

function thisMonth() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ── Tab switch ────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'taxi' && i === 0) || (tab === 'budget' && i === 1));
    });
    document.getElementById('tab-taxi').classList.toggle('active',   tab === 'taxi');
    document.getElementById('tab-budget').classList.toggle('active', tab === 'budget');
}

// ── Taxi ─────────────────────────────────────────────────────
function addTaxiEntry() {
    const date   = document.getElementById('taxi-date').value;
    const amount = parseFloat(document.getElementById('taxi-amount').value);
    const note   = document.getElementById('taxi-note').value.trim();

    if (!date || !amount || amount <= 0) { alert('Enter a valid date and amount.'); return; }

    taxiEntries.unshift({ id: Date.now(), date, amount, note });
    localStorage.setItem('taxi_entries', JSON.stringify(taxiEntries));
    document.getElementById('taxi-amount').value = '';
    document.getElementById('taxi-note').value   = '';
    document.getElementById('taxi-date').value   = todayStr();
    renderTaxi();
}

function deleteTaxi(id) {
    if (!confirm('Delete this entry?')) return;
    taxiEntries = taxiEntries.filter(e => e.id !== id);
    localStorage.setItem('taxi_entries', JSON.stringify(taxiEntries));
    renderTaxi();
}

function renderTaxi() {
    const t  = todayStr();
    const ws = weekStart();
    const ms = thisMonth();
    let day = 0, week = 0, month = 0;

    const allTaxi = [...taxiEntries, ...taxiTrips];
    allTaxi.forEach(e => {
        if (e.date === t)           day   += e.amount;
        if (e.date >= ws)           week  += e.amount;
        if (e.date.startsWith(ms))  month += e.amount;
    });

    document.getElementById('taxi-today').textContent = fmt(day);
    document.getElementById('taxi-week').textContent  = fmt(week);
    document.getElementById('taxi-month').textContent = fmt(month);

    const list = document.getElementById('taxi-list');
    if (!taxiEntries.length) {
        list.innerHTML = '<div class="empty-state">No entries yet — add your first earnings above.</div>';
        return;
    }

    list.innerHTML = taxiEntries.map(e => `
        <div class="entry-item">
            <div class="entry-meta">
                <div class="entry-date">${fmtDate(e.date)}</div>
                ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
            </div>
            <div class="entry-right">
                <span class="entry-amount amt-taxi">${fmt(e.amount)}</span>
                <button class="del-btn" onclick="deleteTaxi(${e.id})">✕</button>
            </div>
        </div>
    `).join('');
}

// ── Trips ─────────────────────────────────────────────────────
function addTrip() {
    const date   = document.getElementById('trip-date').value;
    const amount = parseFloat(document.getElementById('trip-amount').value);
    const note   = document.getElementById('trip-note').value.trim();

    if (!date || !amount || amount <= 0) { alert('Enter a valid date and amount.'); return; }

    taxiTrips.unshift({ id: Date.now(), date, amount, note });
    localStorage.setItem('taxi_trips', JSON.stringify(taxiTrips));
    document.getElementById('trip-amount').value = '';
    document.getElementById('trip-note').value   = '';
    document.getElementById('trip-date').value   = todayStr();
    renderTrips();
    renderTaxi();
}

function deleteTrip(id) {
    if (!confirm('Delete this trip?')) return;
    taxiTrips = taxiTrips.filter(e => e.id !== id);
    localStorage.setItem('taxi_trips', JSON.stringify(taxiTrips));
    renderTrips();
    renderTaxi();
}

function renderTrips() {
    const list = document.getElementById('trip-list');
    if (!taxiTrips.length) {
        list.innerHTML = '<div class="empty-state">No trips logged yet — add your first trip above.</div>';
        return;
    }
    list.innerHTML = taxiTrips.map(e => `
        <div class="entry-item" style="border-left:3px solid #38a169">
            <div class="entry-meta">
                <div class="entry-date">${fmtDate(e.date)}</div>
                ${e.note ? `<div class="entry-note">${e.note}</div>` : '<div class="entry-note" style="color:var(--text-muted)">Trip</div>'}
            </div>
            <div class="entry-right">
                <span class="entry-amount amt-income">${fmt(e.amount)}</span>
                <button class="del-btn" onclick="deleteTrip(${e.id})">✕</button>
            </div>
        </div>
    `).join('');
}

// ── Budget ────────────────────────────────────────────────────
const TYPE_CFG = {
    income:     { sel: 'sel-green',  btnText: '+ Add Income',           btnClass: 'btn-green', amtClass: 'amt-income',  sign: '+' },
    savings:    { sel: 'sel-blue',   btnText: '🏦 Add to Savings',      btnClass: 'btn-dark',  amtClass: 'amt-saving',  sign: '+' },
    expense:    { sel: 'sel-red',    btnText: '− Add Expense',          btnClass: 'btn-red',   amtClass: 'amt-expense', sign: '-' },
    withdrawal: { sel: 'sel-orange', btnText: '↩ Withdraw from Savings',btnClass: 'btn-red',   amtClass: 'amt-expense', sign: '-' },
};

function setType(type) {
    budgetType = type;
    ['income','savings','expense','withdrawal'].forEach(t => {
        document.getElementById('btn-' + t).className =
            'type-btn' + (t === type ? ' ' + TYPE_CFG[t].sel : '');
    });
    const cfg = TYPE_CFG[type];
    const sub = document.getElementById('budget-submit');
    sub.textContent = cfg.btnText;
    sub.className   = 'btn ' + cfg.btnClass;
    document.getElementById('budget-cat').disabled = (type === 'savings' || type === 'withdrawal');
}

function addBudgetEntry() {
    const date   = document.getElementById('budget-date').value;
    const amount = parseFloat(document.getElementById('budget-amount').value);
    const cat    = document.getElementById('budget-cat').value;
    const note   = document.getElementById('budget-note').value.trim();

    if (!date || !amount || amount <= 0) { alert('Enter a valid date and amount.'); return; }

    budgetEntries.unshift({ id: Date.now(), date, type: budgetType, cat, amount, note });
    localStorage.setItem('budget_entries', JSON.stringify(budgetEntries));
    document.getElementById('budget-amount').value = '';
    document.getElementById('budget-note').value   = '';
    document.getElementById('budget-date').value   = todayStr();
    renderBudget();
}

function deleteBudget(id) {
    if (!confirm('Delete this entry?')) return;
    budgetEntries = budgetEntries.filter(e => e.id !== id);
    localStorage.setItem('budget_entries', JSON.stringify(budgetEntries));
    renderBudget();
}

function renderBudget() {
    let income = 0, expenses = 0, savings = 0;
    budgetEntries.forEach(e => {
        if (e.type === 'income')     income   += e.amount;
        if (e.type === 'expense')    expenses += e.amount;
        if (e.type === 'savings')    savings  += e.amount;
        if (e.type === 'withdrawal') savings  -= e.amount;
    });

    const balance = income - expenses;
    const balEl   = document.getElementById('budget-balance');
    balEl.textContent = fmt(balance);
    balEl.className   = 'balance-value ' + (balance >= 0 ? 'bal-pos' : 'bal-neg');

    document.getElementById('b-income').textContent   = fmt(income);
    document.getElementById('b-expenses').textContent = fmt(expenses);
    document.getElementById('b-savings').textContent  = fmt(savings);

    const list = document.getElementById('budget-list');
    if (!budgetEntries.length) {
        list.innerHTML = '<div class="empty-state">No entries yet — add your first transaction above.</div>';
        return;
    }

    list.innerHTML = budgetEntries.map(e => {
        const cfg   = TYPE_CFG[e.type] || TYPE_CFG.income;
        const label = (e.type === 'savings' || e.type === 'withdrawal') ? e.type : e.cat;
        return `
            <div class="entry-item">
                <div class="entry-meta">
                    <div class="entry-date">${fmtDate(e.date)} · <span class="tag">${label}</span></div>
                    ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
                </div>
                <div class="entry-right">
                    <span class="entry-amount ${cfg.amtClass}">${cfg.sign}${fmt(e.amount)}</span>
                    <button class="del-btn" onclick="deleteBudget(${e.id})">✕</button>
                </div>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
